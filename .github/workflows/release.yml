name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: "Path of Ascent Setup*.exe"
          - os: ubuntu-latest
            target: linux
            artifact: "Path of Ascent*.AppImage"
          - os: macos-latest
            target: mac
            artifact: "Path of Ascent*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder --${{ matrix.target }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const tag = context.ref.replace('refs/tags/', '');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Path of Ascent ${tag}`,
              body: `## Path of Ascent ${tag}

            Your PoB companion — paste a Path of Building code and get trade links, passive trees, gem setups, and leveling guides.

            ### Download
            | Platform | File |
            |----------|------|
            | Windows | \`Path of Ascent Setup *.exe\` |
            | macOS | \`Path of Ascent *.dmg\` |
            | Linux | \`Path of Ascent *.AppImage\` |

            ### First Launch
            1. Download and install for your platform
            2. Click **Log in with Path of Exile** — a browser window opens
            3. Log in to your PoE account — session is captured automatically
            4. Paste your PoB export code and generate trade links

            ### Features
            - Passive tree visualization with spec diffs
            - Ascendancy nodes by lab order (main + boss-granted split)
            - Mastery selections with cluster notable names
            - Gem links with vendor sources by class
            - 100% stat-to-trade-API matching
            - League start quick-search buttons
            - One-click trade searches (opens pathofexile.com/trade)`,
              draft: false,
              prerelease: false,
            });

            // Upload all files from artifacts
            const artifactDirs = ['release-win', 'release-linux', 'release-mac'];
            for (const dir of artifactDirs) {
              const dirPath = path.join('artifacts', dir);
              if (!fs.existsSync(dirPath)) continue;

              const walk = (d) => {
                const entries = fs.readdirSync(d, { withFileTypes: true });
                const files = [];
                for (const e of entries) {
                  const full = path.join(d, e.name);
                  if (e.isDirectory()) files.push(...walk(full));
                  else files.push(full);
                }
                return files;
              };

              for (const file of walk(dirPath)) {
                const name = path.basename(file);
                // Only upload installer/app files, skip unpacked dirs and yaml
                if (name.endsWith('.exe') || name.endsWith('.dmg') || name.endsWith('.AppImage') || name.endsWith('.zip')) {
                  console.log(`Uploading: ${name}`);
                  const data = fs.readFileSync(file);
                  await github.rest.repos.uploadReleaseAsset({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: release.data.id,
                    name,
                    data,
                  });
                }
              }
            }
